// 三角形を Z バッファ付きでラスタライズ (フラットカラー)
function rasterTri(x0, y0, z0, x1, y1, z1, x2, y2, z2, col) {
	const minX = Math.max(0, Math.ceil(Math.min(x0, x1, x2)));
	const maxX = Math.min(RES_W - 1, Math.floor(Math.max(x0, x1, x2)));
	const minY = Math.max(0, Math.ceil(Math.min(y0, y1, y2)));
	const maxY = Math.min(resH - 1, Math.floor(Math.max(y0, y1, y2)));
	if (minX > maxX || minY > maxY) return;
	const area = (x1 - x0) * (y2 - y0) - (x2 - x0) * (y1 - y0);
	if (area === 0) return;
	const inv = 1 / area;
	for (let y = minY; y <= maxY; y++) {
		const rowOff = y * RES_W;
		for (let x = minX; x <= maxX; x++) {
			const w0 = ((x1 - x) * (y2 - y) - (x2 - x) * (y1 - y)) * inv;
			if (w0 < 0) continue;
			const w1 = ((x2 - x) * (y0 - y) - (x0 - x) * (y2 - y)) * inv;
			if (w1 < 0) continue;
			const w2 = 1 - w0 - w1;
			if (w2 < 0) continue;
			const z = w0 * z0 + w1 * z1 + w2 * z2;
			const off = rowOff + x;
			if (z > zbuf[off]) {
				zbuf[off] = z;
				px32[off] = col;
			}
		}
	}
}

// テクスチャ付き三角形 (UV 最近傍サンプリング、正射影なので affine 補間で正確)
function rasterTriTex(x0, y0, z0, u0, v0, x1, y1, z1, u1, v1, x2, y2, z2, u2, v2, tex, lit) {
	const minX = Math.max(0, Math.ceil(Math.min(x0, x1, x2)));
	const maxX = Math.min(RES_W - 1, Math.floor(Math.max(x0, x1, x2)));
	const minY = Math.max(0, Math.ceil(Math.min(y0, y1, y2)));
	const maxY = Math.min(resH - 1, Math.floor(Math.max(y0, y1, y2)));
	if (minX > maxX || minY > maxY) return;
	const area = (x1 - x0) * (y2 - y0) - (x2 - x0) * (y1 - y0);
	if (area === 0) return;
	const inv = 1 / area;
	for (let y = minY; y <= maxY; y++) {
		const rowOff = y * RES_W;
		for (let x = minX; x <= maxX; x++) {
			const w0 = ((x1 - x) * (y2 - y) - (x2 - x) * (y1 - y)) * inv;
			if (w0 < 0) continue;
			const w1 = ((x2 - x) * (y0 - y) - (x0 - x) * (y2 - y)) * inv;
			if (w1 < 0) continue;
			const w2 = 1 - w0 - w1;
			if (w2 < 0) continue;
			const z = w0 * z0 + w1 * z1 + w2 * z2;
			const off = rowOff + x;
			if (z <= zbuf[off]) continue;
			zbuf[off] = z;
			let tx = (w0 * u0 + w1 * u1 + w2 * u2) * tex.w | 0;
			let ty = (1 - (w0 * v0 + w1 * v1 + w2 * v2)) * tex.h | 0;
			if (tx < 0) tx = 0; else if (tx >= tex.w) tx = tex.w - 1;
			if (ty < 0) ty = 0; else if (ty >= tex.h) ty = tex.h - 1;
			const t = tex.px[ty * tex.w + tx];
			const r = Math.min(255, (t & 255) * lit | 0);
			const g = Math.min(255, ((t >>> 8) & 255) * lit | 0);
			const b = Math.min(255, ((t >>> 16) & 255) * lit | 0);
			px32[off] = r | (g << 8) | (b << 16) | (255 << 24);
		}
	}
}

// 3D 直線 (Z テストのみ、zbuf には書かない = 後続のラインと干渉しない)。
// bias は Z 比較の下駄 (正=面の上に乗せる、負=面に負ける)。
function drawLine(x0, y0, z0, x1, y1, z1, col, bias) {
	const steps = Math.max(Math.abs(x1 - x0), Math.abs(y1 - y0), 1) | 0;
	for (let i = 0; i <= steps; i++) {
		const t = i / steps;
		const x = Math.round(x0 + (x1 - x0) * t), y = Math.round(y0 + (y1 - y0) * t);
		if (x < 0 || x >= RES_W || y < 0 || y >= resH) continue;
		const z = z0 + (z1 - z0) * t + bias;
		const off = y * RES_W + x;
		if (z > zbuf[off]) px32[off] = col;
	}
}

// 店内ビューのカメラフレーミング (中心 c と radius)。draw / ピック / ギズモで共有し
// 投影を一致させる (これがズレると serp でギズモ・選択ピックが合わなくなる)。
function sceneFraming() {
	if (sceneForm === "serp")
		return { c: [0, 0.2, (SERP.zBack + SERP.zFront) / 2], radius: Math.max(SERP.hx(), (SERP.zFront - SERP.zBack) / 2) + 1.4 };
	return { c: [0, 0.2, 0], radius: LANE.hl + LANE.r + 0.2 };
}

// =============================================================================
//  描画
// =============================================================================

function draw() {
	resize();
	if (!px32) return;  // resize がレイアウト未確定で初期化を見送った直後
	px32.fill(BG);
	zbuf.fill(-1e9);
	if (!DATA) { ctx.putImageData(img, 0, 0); return; }

	const inst = buildScene();
	const b = sceneBounds(inst);
	let c, radius;
	if (viewMode === "scene") {
		// 店内は部屋 bbox 全体だと引きすぎるので、ゲームカメラ風にレーン中心へフレーミング
		const fr = sceneFraming(); c = fr.c; radius = fr.radius;
	} else if (viewMode === "single") {
		// カルーセルは各CGを共通サイズ・y=0中心へ正規化済み → カメラ固定 (中央を写し隣は端で見切れる)。
		c = [0, 0, 0];
		radius = CAROUSEL_R * 1.75;   // 少し引いて左右の前後ナビ矢印を画面内に収める
	} else if (viewMode === "group") {
		// 中央グループタイルを写す (左右の隣グループは端で薄く見切れる)。x=0 固定。
		c = [0, _groupFrame.cy, _groupFrame.cz];
		radius = _groupFrame.radius * 1.2 + 1.0;   // 前後ナビ矢印ぶんの余白を足す
	} else {
		c = [(b.lo[0] + b.hi[0]) / 2, (b.lo[1] + b.hi[1]) / 2, (b.lo[2] + b.hi[2]) / 2];
		radius = Math.max(1e-6,
			Math.hypot(b.hi[0] - b.lo[0], b.hi[1] - b.lo[1], b.hi[2] - b.lo[2]) / 2);
	}

	const cyw = Math.cos(yaw), syw = Math.sin(yaw), cp = Math.cos(pitch), sp = Math.sin(pitch);
	const scale = Math.min(RES_W, resH) * 0.42 * zoom / radius;

	// ライト方向 (ビュー空間、スライダで方位/高度を調整)
	const az = chk("laz").value * Math.PI / 180, el = chk("lel").value * Math.PI / 180;
	const L = [Math.cos(el) * Math.sin(az), Math.sin(el), Math.cos(el) * Math.cos(az)];

	const proj = (wx, wy, wz) => {
		const x0 = wx - c[0], y0 = wy - c[1], z0 = wz - c[2];
		const x = x0 * cyw + z0 * syw, z = -x0 * syw + z0 * cyw;
		return [x * scale + RES_W / 2, -(y0 * cp - z * sp) * scale + resH / 2, y0 * sp + z * cp];
	};
	lastProj = proj;   // gridPick (ホバー/クリック判定) とカメラを共有

	// 一覧: ホバー中の個別モデル以外を減光 (グループ強調は廃止)。分類は隣グループ減光(it.dim)を使う。
	const pidx = chk("plate").checked ? plateIndex() : -1;
	const dimActive = viewMode === "grid" && hoverModelMi >= 0;

	// ソリッドパス (インスタンスごとに投影 → ラスタライズ)
	// インスタンス変換: スケール s → Y 回転 ry → 平行移動 o
	const projected = [];
	for (const it of inst) {
		const m = it.model || DATA.models[it.mi];
		const tex = it.model ? null : texes[it.mi];
		// it.dim = 単体カルーセル/分類の隣グループの減光 (buildScene が設定)。
		// hoverDim = 一覧/分類でホバー中以外を減光。両者を掛ける。
		const hoverDim = (dimActive && it.mi != null && it.mi !== pidx && it.mi !== hoverModelMi) ? 0.28 : 1;
		const dimF = (it.dim != null ? it.dim : 1) * hoverDim;
		const s = it.s || 1, ry = it.ry || 0, rx = it.rx || 0;
		const cr = Math.cos(ry), sr = Math.sin(ry), crx = Math.cos(rx), srx = Math.sin(rx);
		const n = m.verts.length;
		// 自転ピボット (bbox中心、未指定=原点)。Y回転(横)→X回転(縦)を中心まわりに適用 = 上下左右フリー回転。
		const px = it.piv ? it.piv[0] : 0, py = it.piv ? it.piv[1] : 0, pz = it.piv ? it.piv[2] : 0;
		const sx = new Float32Array(n), sy2 = new Float32Array(n), rz = new Float32Array(n);
		for (let i = 0; i < n; i++) {
			const v = m.verts[i];
			const lx = v[0] - px, ly = v[1] - py, lz = v[2] - pz;
			const x1 = lx * cr + lz * sr, z1 = -lx * sr + lz * cr;        // Y回転
			const y2 = ly * crx - z1 * srx, z2 = ly * srx + z1 * crx;     // X回転
			const p = proj(
				(x1 + px) * s + it.o[0],
				(y2 + py) * s + it.o[1],
				(z2 + pz) * s + it.o[2]);
			sx[i] = p[0]; sy2[i] = p[1]; rz[i] = p[2];
		}
		projected.push({ m, sx, sy2, rz });

		for (let fi = 0; fi < m.faces.length; fi++) {
			const f = m.faces[fi];
			const a = f[0], bb = f[1], d = f[2], q = f[3];
			// 天井カリング: 面の全頂点がローカル y ≥ cullY なら描画しない (水平な天井面だけ消える)。
			if (it.cullY != null && m.verts[a][1] >= it.cullY && m.verts[bb][1] >= it.cullY && m.verts[d][1] >= it.cullY && (q < 0 || m.verts[q][1] >= it.cullY)) continue;
			// Z バッファなので裏面カリング不要 — 両面描画にすると
			// エッジすれすれの角度で出る 1px の隙間 (グレージングアーティファクト) が消える。
			// ライティングはビュー空間法線で (裏面は法線を反転して両面ライティング)
			let nx, ny, nz;
			{
				const m1x = m.verts[bb][0] - m.verts[a][0], m1y = m.verts[bb][1] - m.verts[a][1], m1z = m.verts[bb][2] - m.verts[a][2];
				const m2x = m.verts[d][0] - m.verts[a][0], m2y = m.verts[d][1] - m.verts[a][1], m2z = m.verts[d][2] - m.verts[a][2];
				const wx = m1y * m2z - m1z * m2y, wy = m1z * m2x - m1x * m2z, wz = m1x * m2y - m1y * m2x;
				// モデル法線 → インスタンス Y回転 → X回転 → ビュー回転
				const ix = wx * cr + wz * sr, iz0 = -wx * sr + wz * cr;          // Y
				const iy = wy * crx - iz0 * srx, iz = wy * srx + iz0 * crx;      // X
				const tx = ix * cyw + iz * syw, tz = -ix * syw + iz * cyw;
				nx = tx; ny = iy * cp - tz * sp; nz = iy * sp + tz * cp;
				const nl = Math.hypot(nx, ny, nz) || 1;
				nx /= nl; ny /= nl; nz /= nl;
				if (nz < 0) { nx = -nx; ny = -ny; nz = -nz; }
			}
			const lit = (0.45 + 0.55 * Math.max(nx * L[0] + ny * L[1] + nz * L[2], 0)) * dimF;

			// テクスチャ面 (UV が揃っている時のみ)
			const fu = (tex && m.fuv) ? m.fuv[fi] : null;
			if (fu && fu[0] >= 0 && fu[1] >= 0 && fu[2] >= 0) {
				const U = m.uvs;
				rasterTriTex(
					sx[a], sy2[a], rz[a], U[fu[0]][0], U[fu[0]][1],
					sx[bb], sy2[bb], rz[bb], U[fu[1]][0], U[fu[1]][1],
					sx[d], sy2[d], rz[d], U[fu[2]][0], U[fu[2]][1], tex, lit);
				if (q >= 0 && fu[3] >= 0) {
					rasterTriTex(
						sx[a], sy2[a], rz[a], U[fu[0]][0], U[fu[0]][1],
						sx[d], sy2[d], rz[d], U[fu[2]][0], U[fu[2]][1],
						sx[q], sy2[q], rz[q], U[fu[3]][0], U[fu[3]][1], tex, lit);
				}
				continue;
			}

			const kd = m.mats[f[4]];
			const r = Math.min(255, kd[0] * lit * 255 | 0);
			const g = Math.min(255, kd[1] * lit * 255 | 0);
			const bl = Math.min(255, kd[2] * lit * 255 | 0);
			const col = r | (g << 8) | (bl << 16) | (255 << 24);
			rasterTri(sx[a], sy2[a], rz[a], sx[bb], sy2[bb], rz[bb], sx[d], sy2[d], rz[d], col);
			if (q >= 0) rasterTri(sx[a], sy2[a], rz[a], sx[d], sy2[d], rz[d], sx[q], sy2[q], rz[q], col);
		}
	}

	// グリッド + 原点軸。1 マス = 1 ブロック (= レーン幅 beltHW*2 = 0.8) でサイズをブロック単位で測れる。
	// 店内は床面のすぐ上に重ねて (正バイアスで床に勝たせる) レイアウトを測れるように、CG はモデル底面に敷く。
	if (chk("grid").checked) {
		const U = LANE.beltHW * 2;                       // 1 ブロック = レーン幅 (0.8)
		const inScene = viewMode === "scene";
		// 店内=床面の少し上 / CG=シーン下端 (モデル底面)
		const gy = inScene ? -0.38 : b.lo[1] - 0.001;
		const bias = inScene ? radius * 0.003 : -radius * 0.004;
		const G = Math.max(1, Math.ceil(radius / U));    // 視野を覆うブロック数
		const ext = G * U;
		for (let k = -G; k <= G; k++) {                  // 線間隔 = 1 ブロック
			const i = k * U;
			const col = (k % 5 === 0) ? COL_GRID_MAJOR : COL_GRID_MINOR;   // 5 ブロックごとに主線
			line3(proj, i, gy, -ext, i, gy, ext, col, bias);
			line3(proj, -ext, gy, i, ext, gy, i, col, bias);
		}
		const ab = inScene ? radius * 0.004 : -radius * 0.002;
		line3(proj, -ext, gy, 0, ext, gy, 0, COL_AXIS_X, ab);
		line3(proj, 0, gy, -ext, 0, gy, ext, COL_AXIS_Z, ab);
		line3(proj, 0, gy, 0, 0, gy + ext, 0, COL_AXIS_Y, ab);
	}

	// ワイヤーフレーム (面の輪郭のみ、対角線は引かない)
	if (chk("wire").checked) {
		const bias = radius * 0.006;
		for (const pr of projected) {
			for (const f of pr.m.faces) {
				const e = f[3] >= 0 ? [f[0], f[1], f[2], f[3]] : [f[0], f[1], f[2]];
				for (let i = 0; i < e.length; i++) {
					const a = e[i], bb = e[(i + 1) % e.length];
					drawLine(pr.sx[a], pr.sy2[a], pr.rz[a], pr.sx[bb], pr.sy2[bb], pr.rz[bb], COL_WIRE, bias);
				}
			}
		}
	}

	// バウンディングボックス (single モードのみ、皿は含めない)
	if (chk("dims").checked && viewMode === "single") {
		const bb = bboxes[cur], pl = carouselPlace(cur, carouselOffset());   // カルーセル変換に合わせる
		const bias = radius * 0.004;
		const tf = v => [v[0] * pl.s + pl.o[0], v[1] * pl.s + pl.o[1], v[2] * pl.s + pl.o[2]];
		for (const [p, q] of bboxEdges(bb.lo, bb.hi)) {
			const a = tf(p), b2 = tf(q);
			line3(proj, a[0], a[1], a[2], b2[0], b2[1], b2[2], COL_BBOX, bias);
		}
	}

	// 装飾エディタ: 選択中の装飾を強調 (脈動ボックス) + XYZ 移動ギズモ (軸矢印を掴んで移動)
	if (viewMode === "scene" && editMode && selDecor >= 0 && selDecor < DECOR.length) {
		const it = decorInst(DECOR[selDecor]);
		if (it) {
			const b = bboxes[it.mi], s = it.s, cr = Math.cos(it.ry), sr = Math.sin(it.ry), o = it.o;
			const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.006);
			const m = (0.05 + 0.05 * pulse) / s;  // モデル空間マージン (脈動)
			const tp = (vx, vy, vz) => proj((vx * cr + vz * sr) * s + o[0], vy * s + o[1], (-vx * sr + vz * cr) * s + o[2]);
			for (const [A, B] of bboxEdges([b.lo[0] - m, b.lo[1] - m, b.lo[2] - m], [b.hi[0] + m, b.hi[1] + m, b.hi[2] + m])) {
				const p = tp(A[0], A[1], A[2]), q = tp(B[0], B[1], B[2]);
				drawLine(p[0], p[1], p[2], q[0], q[1], q[2], COL_SEL, 9e-3);
			}
			drawGizmo(proj);  // X=赤 / Y=緑 / Z=青 の移動矢印 (最前面)
		}
	}

	ctx.putImageData(img, 0, 0);

	// 寸法テキストオーバーレイ (ピクセルバッファ外の 2D 描画)
	if (chk("dims").checked && viewMode === "single") {
		const bb = bboxes[cur], lo = bb.lo, hi = bb.hi;
		ctx.fillStyle = "#ffd54a";
		ctx.font = "15px ui-monospace, Menlo, monospace";
		ctx.fillText(
			"W " + (hi[0] - lo[0]).toFixed(3) + "  H " + (hi[1] - lo[1]).toFixed(3) + "  D " + (hi[2] - lo[2]).toFixed(3), 8, 20);
		ctx.fillText(
			"x " + lo[0] + " … " + hi[0] + " / y " + lo[1] + " … " + hi[1] + " / z " + lo[2] + " … " + hi[2], 8, 40);
	}
}

function line3(proj, ax, ay, az, bx, by, bz, col, bias) {
	const p = proj(ax, ay, az), q = proj(bx, by, bz);
	drawLine(p[0], p[1], p[2], q[0], q[1], q[2], col, bias);
}

function bboxEdges(lo, hi) {
	const c = [
		[lo[0], lo[1], lo[2]], [hi[0], lo[1], lo[2]], [hi[0], lo[1], hi[2]], [lo[0], lo[1], hi[2]],
		[lo[0], hi[1], lo[2]], [hi[0], hi[1], lo[2]], [hi[0], hi[1], hi[2]], [lo[0], hi[1], hi[2]],
	];
	return [
		[c[0], c[1]], [c[1], c[2]], [c[2], c[3]], [c[3], c[0]],
		[c[4], c[5]], [c[5], c[6]], [c[6], c[7]], [c[7], c[4]],
		[c[0], c[4]], [c[1], c[5]], [c[2], c[6]], [c[3], c[7]],
	];
}

// =============================================================================
//  装飾配置エディタ
// =============================================================================

// 店内モードの投影 (draw と同じフレーミング)。ピック/ギズモ用。
function sceneProj() {
	const { c, radius } = sceneFraming();
	const cyw = Math.cos(yaw), syw = Math.sin(yaw), cp = Math.cos(pitch), sp = Math.sin(pitch);
	const scale = Math.min(RES_W, resH) * 0.42 * zoom / radius;
	const proj = (wx, wy, wz) => {
		const x0 = wx - c[0], y0 = wy - c[1], z0 = wz - c[2];
		const x = x0 * cyw + z0 * syw, z = -x0 * syw + z0 * cyw;
		return [x * scale + RES_W / 2, -(y0 * cp - z * sp) * scale + resH / 2];
	};
	return { scale, cyw, syw, sp, proj };
}

function clientToInternal(cx, cy) {
	const r = cv.getBoundingClientRect();
	return [(cx - r.left) / r.width * RES_W, (cy - r.top) / r.height * resH, RES_W / r.width, resH / r.height];
}

// クリック位置に最も近い装飾アンカーの index (なければ -1)
function pickDecor(cx, cy) {
	if (!DATA || !DECOR.length) return -1;
	const [ix, iy] = clientToInternal(cx, cy);
	const sp = sceneProj();
	let best = -1, bestD = 42 * 42;
	for (let i = 0; i < DECOR.length; i++) {
		const d = DECOR[i], p = sp.proj(d.x || 0, d.y || 0, d.z || 0);
		const dd = (p[0] - ix) ** 2 + (p[1] - iy) ** 2;
		if (dd < bestD) { bestD = dd; best = i; }
	}
	return best;
}

// 画面 (dSX,dSY) 移動量 -> 地面 (XZ) 移動量。sceneProj の 2x2 [[a,b],[c,d]] を反転。
function screenToWorldXZ(dSX, dSY) {
	const { scale, cyw, syw, sp } = sceneProj();
	const a = scale * cyw, b = scale * syw, c = -scale * sp * syw, e = scale * sp * cyw;
	const det = a * e - b * c;
	if (Math.abs(det) < 1e-6) return [0, 0];
	return [(e * dSX - b * dSY) / det, (-c * dSX + a * dSY) / det];
}

// ── XYZ 移動ギズモ (Blender 等でおなじみの軸矢印を掴んで移動) ──────────────
// 自由ドラッグ移動は誤操作しやすいので廃止。選択 → 軸矢印を掴んでその軸だけ移動。
const GIZMO_AXES = [[1, 0, 0, "x", COL_AXIS_X], [0, 1, 0, "y", COL_AXIS_Y], [0, 0, 1, "z", COL_AXIS_Z]];

// 選択中装飾の中心 (ワールド) と軸長 (画面上で約80px相当)。
function gizmoGeom() {
	if (selDecor < 0 || selDecor >= DECOR.length) return null;
	const it = decorInst(DECOR[selDecor]); if (!it) return null;
	const b = bboxes[it.mi], s = it.s, cr = Math.cos(it.ry), sr = Math.sin(it.ry);
	const cm = [(b.lo[0] + b.hi[0]) / 2, (b.lo[1] + b.hi[1]) / 2, (b.lo[2] + b.hi[2]) / 2];
	const o = [
		it.o[0] + (cm[0] * cr + cm[2] * sr) * s,
		it.o[1] + cm[1] * s,
		it.o[2] + (-cm[0] * sr + cm[2] * cr) * s,
	];
	const { radius } = sceneFraming();
	const scale = Math.min(RES_W, resH) * 0.42 * zoom / radius;
	return { o, len: 80 / scale };
}

// 画面に太線を最前面で描く (z 無視)。ギズモの軸矢印用。
function gizmoLine2(p0, p1, col, w) {
	const dx = p1[0] - p0[0], dy = p1[1] - p0[1];
	const len = Math.hypot(dx, dy) || 1, nx = -dy / len, ny = dx / len;
	const steps = Math.max(Math.abs(dx), Math.abs(dy), 1) | 0;
	for (let i = 0; i <= steps; i++) {
		const t = i / steps, bx = p0[0] + dx * t, by = p0[1] + dy * t;
		for (let o = -w; o <= w; o++) {
			const x = Math.round(bx + nx * o), y = Math.round(by + ny * o);
			if (x < 0 || x >= RES_W || y < 0 || y >= resH) continue;
			px32[y * RES_W + x] = col;
		}
	}
}

// 選択中装飾に XYZ 軸矢印を描く (掴んでいる軸は太く)。
function drawGizmo(proj) {
	const g = gizmoGeom(); if (!g) return;
	const pO = proj(g.o[0], g.o[1], g.o[2]);
	for (const [ax, ay, az, name, col] of GIZMO_AXES) {
		const pE = proj(g.o[0] + ax * g.len, g.o[1] + ay * g.len, g.o[2] + az * g.len);
		const w = gizmoAxis === name ? 3 : 2;
		gizmoLine2(pO, pE, col, w);
		let dx = pE[0] - pO[0], dy = pE[1] - pO[1]; const l = Math.hypot(dx, dy) || 1; dx /= l; dy /= l;
		const ah = 9, hw = 4.5;  // 矢じり (画面空間)
		gizmoLine2(pE, [pE[0] - dx * ah - dy * hw, pE[1] - dy * ah + dx * hw], col, w);
		gizmoLine2(pE, [pE[0] - dx * ah + dy * hw, pE[1] - dy * ah - dx * hw], col, w);
	}
}

// 2D 点と線分の距離 (軸ピック用)。
function distToSeg(px, py, ax, ay, bx, by) {
	const dx = bx - ax, dy = by - ay, l2 = dx * dx + dy * dy;
	let t = l2 ? ((px - ax) * dx + (py - ay) * dy) / l2 : 0;
	t = Math.max(0, Math.min(1, t));
	return Math.hypot(px - (ax + dx * t), py - (ay + dy * t));
}

// クリックが掴んでいるギズモ軸 ("x"/"y"/"z") を返す (なければ null)。
function pickGizmoAxis(cx, cy) {
	const g = gizmoGeom(); if (!g) return null;
	const [ix, iy] = clientToInternal(cx, cy);
	const sp = sceneProj();
	const pO = sp.proj(g.o[0], g.o[1], g.o[2]);
	let best = null, bestD = 13;
	for (const [ax, ay, az, name] of GIZMO_AXES) {
		const pE = sp.proj(g.o[0] + ax * g.len, g.o[1] + ay * g.len, g.o[2] + az * g.len);
		const d = distToSeg(ix, iy, pO[0], pO[1], pE[0], pE[1]);
		if (d < bestD) { bestD = d; best = name; }
	}
	return best;
}

// 画面ドラッグを「掴んでいる軸方向」のワールド移動へ変換 (他の軸は動かさない)。
function dragGizmo(cx, cy) {
	if (!gizmoAxis || selDecor < 0) return;
	const g = gizmoGeom(); if (!g) return;
	const sp = sceneProj();
	const v = gizmoAxis === "x" ? [1, 0, 0] : gizmoAxis === "y" ? [0, 1, 0] : [0, 0, 1];
	const pO = sp.proj(g.o[0], g.o[1], g.o[2]);
	const pA = sp.proj(g.o[0] + v[0], g.o[1] + v[1], g.o[2] + v[2]);  // +1 ワールド単位の画面ベクトル
	const sx = pA[0] - pO[0], sy = pA[1] - pO[1];
	const denom = sx * sx + sy * sy; if (denom < 1e-6) return;
	const [, , fx, fy] = clientToInternal(cx, cy);
	const dSX = (cx - lastX) * fx, dSY = (cy - lastY) * fy;
	const wd = (dSX * sx + dSY * sy) / denom;  // 画面ドラッグ量 → 軸方向のワールド移動量
	const d = DECOR[selDecor];
	if (gizmoAxis === "x") d.x = +((d.x || 0) + wd).toFixed(3);
	else if (gizmoAxis === "y") d.y = +((d.y || 0) + wd).toFixed(3);
	else d.z = +((d.z || 0) + wd).toFixed(3);
	fillFields(); markDirty();
}

// 矢印キー: 画面に対して上下左右へ step ユニット動かす (カメラ相対)
function nudgeSelected(dirX, dirY, step) {
	if (selDecor < 0) return;
	const right = screenToWorldXZ(1, 0), down = screenToWorldXZ(0, 1);
	const rl = Math.hypot(right[0], right[1]) || 1, dl = Math.hypot(down[0], down[1]) || 1;
	const d = DECOR[selDecor];
	d.x = +((d.x || 0) + (right[0] / rl * dirX + down[0] / dl * dirY) * step).toFixed(3);
	d.z = +((d.z || 0) + (right[1] / rl * dirX + down[1] / dl * dirY) * step).toFixed(3);
}

// 矢印キーで移動 / Shift+矢印で高さ
window.addEventListener("keydown", e => {
	if (!editMode || viewMode !== "scene" || selDecor < 0) return;
	if (document.activeElement && document.activeElement.tagName === "INPUT") return;  // 数値入力中は無視
	if (!e.key.startsWith("Arrow")) return;
	const now = performance.now();                       // 連続押しは 1 undo ステップに合体
	if (now - _lastNudge > 500) pushHistory();
	_lastNudge = now;
	const d = DECOR[selDecor], step = 0.04, hstep = 0.04;
	let handled = true;
	if (e.shiftKey) {
		if (e.key === "ArrowUp" || e.key === "ArrowRight") d.y = +((d.y || 0) + hstep).toFixed(3);
		else if (e.key === "ArrowDown" || e.key === "ArrowLeft") d.y = +((d.y || 0) - hstep).toFixed(3);
		else handled = false;
	} else {
		if (e.key === "ArrowLeft") nudgeSelected(-1, 0, step);
		else if (e.key === "ArrowRight") nudgeSelected(1, 0, step);
		else if (e.key === "ArrowUp") nudgeSelected(0, -1, step);
		else if (e.key === "ArrowDown") nudgeSelected(0, 1, step);
		else handled = false;
	}
	if (handled) { e.preventDefault(); fillFields(); markDirty(); }
});

function keyName(key) { const m = DATA && DATA.models.find(x => x.key === key); return m ? m.name : key; }
function markDirty() { dirty = true; setEditStatus("● 未保存", "unsaved"); }

// ゲーム(decor_layout.json)へ書き込む唯一の経路。loop/serp 両レイアウトを書く。成功で dirty=false。
async function saveDecor() {

		size: +(d.size || 0.3), rot: +(d.rot || 0), hang: !!d.hang }));

		const r = await fetch("save-layout", { method: "POST", headers: { "Content-Type": "application/json" }, body });
		const j = await r.json();
		if (!j.ok) throw new Error(j.error || "失敗");
		dirty = false; setEditStatus("✓ 保存しました (" + j.count + "個)", "saved");
		return true;
	} catch (e) { setEditStatus("⚠ 保存失敗 (serve.py 要起動)", "unsaved"); return false; }

async function loadDecor() {

			DECOR_ALL = { loop: (j.loop || []).map(d => ({ ...d })), serp: (j.serp || []).map(d => ({ ...d })) };
		} else {                                                          // 旧フォーマット (decorations + loop_only) から移行
			const all = (j.decorations || []).map(({ loop_only, ...d }) => d);

			DECOR_ALL = { loop: all.map(d => ({ ...d })), serp: allRaw.filter(d => !d.loop_only).map(({ loop_only, ...d }) => d) };
		}
	} catch (e) { /* 旧 http.server だと 404 → 空のまま */ }

function effTags(i) { return [...new Set([...autoTagsOf(i), ...manTagsOf(fixKeyOf(i))])]; }
function allTagsWithCounts() {   // 全モデルの実効タグ → [tag, 件数] (件数多い順、同数は名前順)
	const c = new Map();

let lastT = performance.now();

function loop() {
	const now = performance.now();
	const dt = Math.min(0.05, (now - lastT) / 1000);
	lastT = now;
	if (chk("auto").checked && !dragging) {
		if (viewMode === "single" || viewMode === "group") spin += 0.01;   // 対象だけ自転 (カメラ固定)
		else yaw += 0.008;                                                 // 店内/一覧はカメラ周回
	}
	if (slide) {                                  // 単体カルーセル遷移 (1フェーズ: 隣を中央へ流す)
		slide.t += dt / SLIDE_DUR;
		if (slide.t >= 1) { cur = slide.toMi; slide = null; afterSingleChange(); }
	}
	if (viewMode === "scene") {
		// ゲームと同じレーン進行 (0.10 周/s) + 皿の自転 (-1.5 rad/s)。
		// 蛇行は周長が長いぶん割合速度を下げ、通常店と同じ流速に揃える。
		const frac = (sceneForm === "serp" && _serpLen > 0)
			? LANE.speed * (LOOP_LEN / _serpLen) : LANE.speed;
		laneOffset = (laneOffset + frac * dt) % 1;
		laneSpin -= LANE.spinSpeed * dt;
	}
	draw();
	requestAnimationFrame(loop);
}

// 1 本指 (マウス) = 回転 / 2 本指 = ピンチズーム (スマホ対応)
const pointers = new Map();
let pinchDist = 0;

cv.addEventListener("pointerdown", e => {
	pointers.set(e.pointerId, [e.clientX, e.clientY]);
	cv.setPointerCapture(e.pointerId);
	// 装飾配置モード: ①選択中オブジェクトの移動ギズモの軸を掴めるか → その軸だけ移動
	//                 ②オブジェクト本体クリック → 選択のみ (自由ドラッグは廃止=誤操作防止)
	//                 ③何もなければ素通り → カメラ回転
	if (editMode && viewMode === "scene" && pointers.size === 1) {
		const axis = pickGizmoAxis(e.clientX, e.clientY);
		if (axis) {
			pushHistory();                 // ドラッグ1回 = 1 undo ステップ
			gizmoAxis = axis; dragging = false;
			lastX = e.clientX; lastY = e.clientY; cv.style.cursor = "grabbing";
			return;
		}
		const hit = pickDecor(e.clientX, e.clientY);
		if (hit >= 0) {
			selectDecor(hit); dragging = false; cv.style.cursor = "default";
			return;
		}
	}
	// CG閲覧: タップで遷移 (一覧/分類=モデルへ / 単体=左右クリックで前/次)。動かせば回転。確定は pointerup。
	if (!editMode && (viewMode === "grid" || viewMode === "group" || viewMode === "single") && pointers.size === 1) {
		_tapMi = (viewMode === "single") ? -1 : gridPick(e.clientX, e.clientY);
		_downXY = [e.clientX, e.clientY]; _movedFar = false;
	}
	if (pointers.size === 1) {
		dragging = true; lastX = e.clientX; lastY = e.clientY;
		cv.style.cursor = "grabbing";
	} else if (pointers.size === 2) {
		dragging = false;
		const p = [...pointers.values()];
		pinchDist = Math.hypot(p[0][0] - p[1][0], p[0][1] - p[1][1]);
	}
});
cv.addEventListener("pointermove", e => {
	if (pointers.has(e.pointerId)) pointers.set(e.pointerId, [e.clientX, e.clientY]);
	if (_downXY && (Math.abs(e.clientX - _downXY[0]) + Math.abs(e.clientY - _downXY[1]) > 6)) _movedFar = true;
	if (gizmoAxis) { dragGizmo(e.clientX, e.clientY); lastX = e.clientX; lastY = e.clientY; return; }
	if (pointers.size === 2) {
		const p = [...pointers.values()];
		const d = Math.hypot(p[0][0] - p[1][0], p[0][1] - p[1][1]);
		if (pinchDist > 0) zoom = Math.max(0.3, Math.min(4, zoom * d / pinchDist));
		pinchDist = d;
		return;
	}
	// CG閲覧のホバー強調 (ボタン非押下時): 一覧/分類とも個別モデルを強調 (他を減光)。
	if (!dragging && !editMode && (viewMode === "grid" || viewMode === "group")) {
		hoverModelMi = gridPick(e.clientX, e.clientY);
	}
	if (!dragging) return;
	// マウスで視点を動かしたら自動回転は OFF にする (チップは CSS で自動反映)
	const _a = chk("auto");
	if (_a && _a.checked) _a.checked = false;
	if (viewMode === "single" || viewMode === "group") {
		spin += (e.clientX - lastX) * 0.01;    // 横ドラッグ = 対象だけ左右回転
		spinX += (e.clientY - lastY) * 0.01;   // 縦ドラッグ = 対象だけ上下回転 (カメラ固定=隣・矢印は静止)
	} else {
		yaw += (e.clientX - lastX) * 0.01;
		pitch = Math.max(-1.5, Math.min(1.5, pitch + (e.clientY - lastY) * 0.01));
	}
	lastX = e.clientX; lastY = e.clientY;
});
function _endPointer(e) {
	// CG閲覧: ほぼ動かさず離した = タップ。
	if (_downXY && !_movedFar && !editMode) {
		let handled = false;
		// 黄色い前後ナビ矢印のクリック判定 (単体/分類)。投影位置の近傍をヒットとする。
		if (_arrowWorld && lastProj && (viewMode === "single" || viewMode === "group")) {
			const [ix, iy] = clientToInternal(e.clientX, e.clientY);
			for (const a of _arrowWorld) {
				const p = lastProj(a.x, a.y, a.z);
				if ((p[0] - ix) ** 2 + (p[1] - iy) ** 2 < 80 * 80) { a.act(); handled = true; break; }
			}
		}
		if (!handled) {
			if (viewMode === "single") {                       // 単体: 左半分=前 / 右半分=次 (薄いCGをクリック)
				const rect = cv.getBoundingClientRect();
				const fx = (e.clientX - rect.left) / rect.width;
				if (fx < 0.34) startSlide(-1); else if (fx > 0.66) startSlide(1);
			} else if (_tapMi >= 0) {                          // 一覧→単体 / 分類→中央は単体・隣グループは切替
				if (viewMode === "grid") goSingle(_tapMi);
				else if (viewMode === "group") (catOf(_tapMi) === groupCat) ? goSingle(_tapMi) : goGroup(catOf(_tapMi));
			}
		}
	}
	_downXY = null; _tapMi = -1; _movedFar = false;
	pointers.delete(e.pointerId);
	pinchDist = 0;
	gizmoAxis = null;
	if (pointers.size === 1) {
		const p = [...pointers.values()][0];
		dragging = true; lastX = p[0]; lastY = p[1];
	} else if (pointers.size === 0) {
		dragging = false;
		cv.style.cursor = (editMode && viewMode === "scene") ? "default" : "grab";
	}
}
cv.addEventListener("pointerup", _endPointer);
cv.addEventListener("pointercancel", _endPointer);
cv.addEventListener("wheel", e => { e.preventDefault(); zoom = Math.max(0.3, Math.min(4, zoom * (e.deltaY > 0 ? 0.92 : 1.08))); }, { passive: false });
cv.addEventListener("dblclick", () => { yaw = 0.65; pitch = 0.42; zoom = 1; spin = 0; spinX = 0; });

	else if (k === "y") { e.preventDefault(); redo(); }
});

// BGM: ゲームと同じ main_loop.wav (45.7s シームレスループ) をトグル再生。
// スマホは自動再生不可のため、チェック (ユーザー操作) を起点に play する。
let _bgm = null;
document.getElementById("bgm").onchange = e => {
	if (e.target.checked) {
		if (!_bgm) {
			_bgm = new Audio("bgm.wav");
			_bgm.loop = true;
			_bgm.volume = 0.6;
		}
		_bgm.play().catch(err => { stats.textContent = "BGM 再生失敗: " + err.message; });
	} else if (_bgm) {
		_bgm.pause();
	}
};
if (!VIEW_ONLY) setInterval(() => { if (chk("watch").checked) load(true); }, 2000);

// 静的公開ビルド: 開発専用 UI だけ隠す (CG⇄店内 の切替・CG閲覧は公開版でも見せる)。
if (VIEW_ONLY) {
	document.title = "押忍！お寿司王 — プレビュー";
	const titleEl = document.querySelector(".tb-title");
	if (titleEl) titleEl.textContent = "押忍！お寿司王";
	for (const id of ["reload", "chip-watch"]) show(id, false);   // 再読込・監視のみ非表示
}

load(false).then(loop);
</script>
</body>
</html>
